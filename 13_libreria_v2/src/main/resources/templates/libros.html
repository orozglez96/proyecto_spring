<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Libros</title>
</head>
<body>
<h2 th:text = "${session.usuario}"></h2>
	<center>
		<form action=libros method="get">
			Seleccione tema:
			<select name="temaSel">
				<option value="0">-Todos-</option>
				<option th:each="c:${temas}" th:text="${c.tema}" th:value="${c.idTema}"></option>
			</select><br><br>
			<input type="submit" value="Ver libros">
		</form>
		<br><br>
		<table border="1">
			<tr><th>Titulo</th><th>Autor</th><th>Precio</th></tr>
			<tr th:each="a:${libros}">
				<td th:text="${a.titulo}"></td>
				<td th:text="${a.autor}"></td>
				<td th:text="${a.precio}"></td>
			</tr>
		</table>
		<br>
		<a href="goLogin">Volver</a>
	

	</center>
</body>
</html>
